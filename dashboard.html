<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clamp — Claim Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0f0f8;
      --text-muted: #6b7280;
      --text-sub: #9ca3af;
      --orange: #f97316;
      --orange-glow: rgba(249, 115, 22, 0.15);
      --orange-dim: rgba(249, 115, 22, 0.08);
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --font: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; overflow-x: hidden; }
    
    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 260px; min-height: 100vh; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
      padding: 0 0 24px 0;
    }
    .sidebar-logo {
      padding: 28px 24px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .sidebar-logo img { width: 120px; height: 48px; object-fit: contain; }
    .sidebar-logo-text { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
    .sidebar-logo-text span { color: var(--orange); }

    .sidebar-section-label {
      padding: 20px 24px 8px; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted);
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 11px 20px; margin: 2px 12px;
      border-radius: 10px; cursor: pointer; transition: all 0.2s; color: var(--text-sub);
      font-size: 0.875rem; font-weight: 500; text-decoration: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item.active { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(249,115,22,0.2); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-bottom { margin-top: auto; padding: 16px 24px; }
    .sidebar-user {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      background: var(--surface2); border-radius: 12px; border: 1px solid var(--border);
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--orange-glow);
      border: 1px solid var(--orange); display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: var(--orange); flex-shrink: 0;
    }
    .user-name { font-size: 0.85rem; font-weight: 600; }
    .user-role { font-size: 0.72rem; color: var(--text-muted); }

    /* ─── MAIN CONTENT ─── */
    .main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }

    /* ─── TOPBAR ─── */
    .topbar {
      width: 100%; padding: 20px 36px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); background: var(--surface);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 1.1rem; font-weight: 700; }
    .topbar-right { display: flex; gap: 12px; align-items: center; }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; color: var(--text-muted); position: relative;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: var(--border2); }
    .icon-btn svg { width: 17px; height: 17px; }
    .notif-badge {
      position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; border-radius: 50%;
      background: var(--orange); font-size: 0.6rem; font-weight: 700; color: #fff;
      display: flex; align-items: center; justify-content: center; border: 2px solid var(--surface);
    }
    .btn-new {
      background: var(--orange); color: #fff; border: none; padding: 9px 18px; border-radius: 10px;
      font-family: var(--font); font-size: 0.85rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap;
    }
    .btn-new:hover { background: #ea6c0c; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(249,115,22,0.3); }
    .btn-new svg { width: 16px; height: 16px; }

    /* ─── PAGE CONTENT ─── */
    .page-content { padding: 36px; flex: 1; }

    /* ─── STAT CARDS ─── */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 24px; display: flex; flex-direction: column; gap: 16px; transition: all 0.2s;
    }
    .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .stat-icon {
      width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
    }
    .stat-icon svg { width: 22px; height: 22px; }
    .stat-icon.orange { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(249,115,22,0.2); }
    .stat-icon.green { background: rgba(34,197,94,0.1); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
    .stat-icon.amber { background: rgba(245,158,11,0.1); color: var(--warning); border: 1px solid rgba(245,158,11,0.2); }
    .stat-icon.red { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
    .stat-num { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; margin-top: 2px; }

    /* ─── SECTION HEADER ─── */
    .section-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-hdr h2 { font-size: 1.05rem; font-weight: 700; }
    .section-hdr a { font-size: 0.82rem; color: var(--orange); text-decoration: none; font-weight: 500; }
    .section-hdr a:hover { text-decoration: underline; }

    /* ─── CLAIMS GRID ─── */
    .claims-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .claim-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 22px; cursor: pointer; transition: all 0.25s;
    }
    .claim-card:hover { border-color: rgba(249,115,22,0.3); transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
    .claim-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
    .claim-id { font-size: 0.95rem; font-weight: 700; }
    .claim-type { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; margin-top: 3px; }
    .badge {
      padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.3px; white-space: nowrap;
    }
    .badge.green { background: rgba(34,197,94,0.12); color: var(--success); border: 1px solid rgba(34,197,94,0.25); }
    .badge.amber { background: rgba(245,158,11,0.12); color: var(--warning); border: 1px solid rgba(245,158,11,0.25); }
    .badge.red { background: rgba(239,68,68,0.12); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }
    .badge.orange { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(249,115,22,0.25); }
    .claim-divider { height: 1px; background: var(--border); margin-bottom: 16px; }
    .claim-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.82rem; }
    .claim-row:last-child { margin-bottom: 0; }
    .cr-label { color: var(--text-muted); }
    .cr-val { font-weight: 600; }

    /* ─── EMPTY STATE ─── */
    .empty { text-align: center; padding: 80px 20px; }
    .empty svg { width: 64px; height: 64px; color: var(--text-muted); margin-bottom: 20px; opacity: 0.5; }
    .empty h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
    .empty p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }

    /* ─── MODAL ─── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 999; display: none; }
    .modal {
      position: fixed; right: 0; top: 0; bottom: 0; width: 480px; max-width: 100vw;
      background: var(--surface); border-left: 1px solid var(--border); z-index: 1000;
      transform: translateX(100%); overflow-y: auto; display: flex; flex-direction: column;
    }
    .modal-head {
      padding: 28px 32px; border-bottom: 1px solid var(--border); display: flex;
      justify-content: space-between; align-items: center; position: sticky; top: 0;
      background: var(--surface); z-index: 10;
    }
    .modal-head h2 { font-size: 1.2rem; font-weight: 700; }
    .modal-close {
      width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: all 0.2s;
    }
    .modal-close:hover { color: #fff; border-color: var(--border2); }
    .modal-body { padding: 28px 32px; flex: 1; }
    .modal-status { margin-bottom: 24px; }

    /* ─── TIMELINE ─── */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before { content:''; position:absolute; left:7px; top:0; bottom:0; width:2px; background:var(--border); }
    .t-node { position: relative; margin-bottom: 32px; }
    .t-dot { position:absolute; left:-28px; top:4px; width:16px; height:16px; border-radius:50%; background:var(--bg); border:2px solid var(--border); transition:0.3s; }
    .t-node.active .t-dot { border-color:var(--orange); background:var(--orange); box-shadow:0 0 12px var(--orange); }
    .t-node.completed .t-dot { border-color:var(--success); background:var(--success); }
    .t-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
    .t-node.active .t-title { color: var(--orange); }
    .t-node.completed .t-title { color: var(--success); }
    .t-date { font-size: 0.78rem; color: var(--text-muted); }

    /* DEV TOOL */
    .dev-box { background: rgba(245,158,11,0.05); border: 1px dashed rgba(245,158,11,0.3); border-radius: 12px; padding: 16px; margin-top: 24px; }
    .dev-label { font-size: 0.75rem; color: var(--warning); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 10px; }
    .btn-dev { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: var(--font); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-dev:hover { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: var(--warning); }
  </style>
</head>
<body>

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">
    <div class="sidebar-logo" onclick="window.location.href='index.html'">
      <img src="logo/clamp logo.png" alt="Clamp Logo">
    </div>

    <div class="sidebar-section-label">Navigation</div>

    <a class="nav-item active" href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Claim Tracker
    </a>
    <a class="nav-item" href="fnol_flow.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>

    </a>

    <a class="nav-item" href="compare.html">

      Policy Compare
    </a>

    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar" id="avatarInitials">U</div>
        <div>
          <div class="user-name" id="sidebarUserName">User</div>
          <div class="user-role">Clamp Member</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Claim Tracker</div>
      <div class="topbar-right">
        <div class="icon-btn" title="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-badge">2</span>
        </div>
        <div class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>
        <button class="btn-new" onclick="window.location.href='fnol_flow.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Claim
        </button>
      </div>
    </div>

    <div class="page-content">
      <!-- STATS -->
      <div class="stat-grid" id="statGrid">
        <div class="stat-card">
          <div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
          <div><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Claims</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div><div class="stat-num" id="statPending">0</div><div class="stat-label">Under Review</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
          <div><div class="stat-num" id="statApproved">0</div><div class="stat-label">Approved</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
          <div><div class="stat-num" id="statRejected">0</div><div class="stat-label">Rejected</div></div>
        </div>
      </div>

      <!-- CLAIMS -->
      <div class="section-hdr">
        <h2>Your Claims</h2>
        <a href="fnol_flow.html">+ File new claim →</a>
      </div>
      <div id="contentArea"></div>
    </div>
  </div>

  <!-- MODAL OVERLAY -->
  <div id="claimModalOverlay" class="modal-overlay" onclick="closeModal()"></div>
  <div id="claimModal" class="modal">
    <div class="modal-head">
      <div>
        <div style="font-size:0.72rem; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px;">Claim ID</div>
        <h2 id="m-id">CLM-00000</h2>
      </div>
      <div class="modal-close" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-status"><span id="m-status" class="badge amber">Under Review</span></div>
      <p style="font-size:0.85rem; color:var(--text-muted); line-height:1.6; margin-bottom:28px;" id="m-desc"></p>
      <h3 style="font-size:0.9rem; font-weight:700; margin-bottom:20px; color:var(--text-sub); text-transform:uppercase; letter-spacing:0.5px;">Live Tracking</h3>
      <div class="timeline" id="m-timeline"></div>
      <div class="dev-box">
        <div class="dev-label">DEV / DEMO CONTROLS</div>
        <button class="btn-dev" onclick="advanceClaimStatus()">Simulate Status Advance →</button>
      </div>
    </div>
  </div>

  <script>
    const u = localStorage.getItem('clamp_user');
    if(u) {
      document.getElementById('sidebarUserName').textContent = u;
      document.getElementById('avatarInitials').textContent = u.charAt(0).toUpperCase();
    }

    let activeClaimIndex = null, localClaims = [];

    function getStatusBadge(st) {
      st = (st || '').toLowerCase();
      if(st.includes('approv') || st.includes('settl')) return 'green';
      if(st.includes('reject')) return 'red';
      return 'amber';
    }

    function loadClaims() {
      const raw = localStorage.getItem('user_claims');
      localClaims = raw ? JSON.parse(raw) : [];
      renderStats(); renderClaims();
    }

    function renderStats() {
      document.getElementById('statTotal').textContent = localClaims.length;
      document.getElementById('statPending').textContent = localClaims.filter(c => c.status === 'Under Review' || c.status === 'Inspection').length;
      document.getElementById('statApproved').textContent = localClaims.filter(c => c.status.toLowerCase().includes('approv') || c.status.toLowerCase().includes('settl')).length;
      document.getElementById('statRejected').textContent = localClaims.filter(c => c.status.toLowerCase().includes('reject')).length;
    }

    function renderClaims() {
      const area = document.getElementById('contentArea');
      if(!localClaims.length) {
        area.innerHTML = `<div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <h3>No Claims Found</h3>
          <p>You haven't filed any claims yet. Start your first claim below.</p>
          <button onclick="window.location.href='fnol_flow.html'" style="background:var(--orange); color:#fff; border:none; padding:12px 24px; border-radius:10px; font-family:var(--font); font-size:0.875rem; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:8px;">File First Claim →</button>
        </div>`;
        return;
      }
      let html = '<div class="claims-grid">';
      localClaims.forEach((c, i) => {
        const bc = getStatusBadge(c.status);
        html += `<div class="claim-card" onclick="openModal(${i})">
          <div class="claim-card-top">
            <div><div class="claim-id">${c.id}</div><div class="claim-type">${c.incidentType || 'Motor Claim'}</div></div>
            <span class="badge ${bc}">${c.status}</span>
          </div>
          <div class="claim-divider"></div>
          <div class="claim-row"><span class="cr-label">Policy No.</span><span class="cr-val">${c.policyNumber}</span></div>
          <div class="claim-row"><span class="cr-label">Filed On</span><span class="cr-val">${c.date}</span></div>
          <div class="claim-row"><span class="cr-label">Assessment</span><span class="cr-val" style="color:var(--orange)">${c.amount}</span></div>
        </div>`;
      });
      html += '</div>';
      area.innerHTML = html;
      gsap.from('.claim-card', { opacity:0, y:30, duration:0.5, stagger:0.07, ease:"power3.out" });
    }

    function openModal(idx) {
      activeClaimIndex = idx;
      const c = localClaims[idx];
      document.getElementById('m-id').textContent = c.id;
      const st = document.getElementById('m-status');
      st.textContent = c.status; st.className = `badge ${getStatusBadge(c.status)}`;
      document.getElementById('m-desc').textContent = c.summary || 'No description provided.';
      let thtml = '';
      c.timeline.forEach(node => {
        let cls = '';
        if(node.date !== 'Pending' && node.date !== 'In Progress') cls = 'completed';
        if(node.step === c.status || node.date === 'In Progress') cls = 'active';
        if(c.status === 'Settled') cls = 'completed';
        thtml += `<div class="t-node ${cls}"><div class="t-dot"></div><div class="t-title">${node.step}</div><div class="t-date">${node.date}</div></div>`;
      });
      document.getElementById('m-timeline').innerHTML = thtml;
      document.getElementById('claimModalOverlay').style.display = 'block';
      gsap.to('#claimModal', { x:0, duration:0.45, ease:'power3.out' });
      gsap.to('#claimModalOverlay', { opacity:1, duration:0.3 });
    }

    function closeModal() {
      gsap.to('#claimModal', { x:'100%', duration:0.35, ease:'power3.in' });
      gsap.to('#claimModalOverlay', { opacity:0, duration:0.3, onComplete:()=> document.getElementById('claimModalOverlay').style.display='none' });
      activeClaimIndex = null;
    }

    function advanceClaimStatus() {
      if(activeClaimIndex === null) return;
      const c = localClaims[activeClaimIndex];
      const map = {'Under Review':'Inspection','Inspection':'Approved','Approved':'Settled'};
      const tIdx = {'Inspection':2,'Approved':3,'Settled':4};
      if(map[c.status]) {
        c.status = map[c.status];
        const ti = tIdx[c.status];
        if(ti !== undefined) c.timeline[ti].date = new Date().toLocaleDateString();
        if(c.status === 'Approved') c.amount = '₹ 45,000 Settled';
        localStorage.setItem('user_claims', JSON.stringify(localClaims));
        renderStats(); renderClaims(); openModal(activeClaimIndex);
      } else alert('Claim already at terminal state.');
    }

    gsap.set('#claimModal', { x:'100%' });
    gsap.set('#claimModalOverlay', { opacity:0 });
    gsap.from('.stat-card', { opacity:0, y:20, duration:0.5, stagger:0.08, ease:'power3.out' });
    loadClaims();
  </script>
</body>
</html>
